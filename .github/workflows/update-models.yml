name: Update models snapshot

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allow manual runs from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch latest models
        run: bun run update-models

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/models.json
          if git diff --staged --quiet; then
            echo "No model changes — nothing to commit."
          else
            COUNT=$(jq length src/lib/models.json)
            git commit -m "chore: update models snapshot (${COUNT} models)"
            git push
          fi
